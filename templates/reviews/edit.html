{% extends "base.html" %}
{% load static %}

{% block title %}レビュー編集 | Nagoyameshi{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <nav style="--bs-breadcrumb-divider: '>';" aria-label="breadcrumb">
                <ol class="breadcrumb mb-4">
                    <li class="breadcrumb-item"><a href="{% url 'top_page' %}" class="text-decoration-none">ホーム</a></li>
                    <li class="breadcrumb-item"><a href="{% url 'review_list' user.id %}" class="text-decoration-none">レビュー一覧</a></li>
                    <li class="breadcrumb-item active" aria-current="page">レビュー編集</li>
                </ol>
            </nav>

            <div class="card shadow-sm border-0">
                <div class="card-body p-4">
                    <h1 class="h4 mb-4 text-center" style="color: var(--katsu-iro);">
                        <i class="fa-solid fa-pen-to-square me-2"></i>レビューを編集する
                    </h1>

                    <form method="post">
                        {% csrf_token %}
                        
                        {# DjangoのフォームをBootstrapスタイルで表示 #}
                        <div class="mb-4">
                            {{ form.as_p }}
                        </div>

                        <div class="d-flex justify-content-between">
                            <a href="{% url 'review_list' user.id %}" class="btn btn-outline-secondary px-4">
                                キャンセル
                            </a>
                            <button type="submit" class="btn btn-primary px-4" style="background-color: var(--katsu-iro); border-color: var(--katsu-iro);">
                                変更を保存
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
