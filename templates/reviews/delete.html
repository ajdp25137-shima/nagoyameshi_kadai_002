{% extends "base.html" %}
{% load static %}

{% block title %}レビュー削除確認 | Nagoyameshi{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm border-0">
                <div class="card-body p-5 text-center">
                    <div class="mb-4">
                        <i class="fa-solid fa-triangle-exclamation fa-4x" style="color: var(--wagashi-red);"></i>
                    </div>
                    
                    <h1 class="h4 mb-3" style="color: var(--katsu-iro);">レビューを削除しますか？</h1>
                    <p class="text-muted mb-4">
                        この操作は取り消せません。<br>
                        「<strong>{{ object.title }}</strong>」のレビューを完全に削除してよろしいですか？
                    </p>

                    <form method="post">
                        {% csrf_token %}
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-danger py-2">
                                <i class="fa-solid fa-trash-can me-2"></i>削除を確定する
                            </button>
                            <a href="{% url 'review_list' user.id %}" class="btn btn-outline-secondary py-2 mt-2">
                                キャンセルして戻る
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
