{% extends "base.html" %}

{% block content %}
<div class="container py-4">
    <div class="card mx-auto shadow-sm" style="max-width: 500px;">
        <div class="card-body">
            <h3 class="card-title mb-4">{{ restaurant.name }} の予約</h3>
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">予約希望日時</label>
                    <input type="datetime-local" name="reserved_at" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">予約人数</label>
                    {{ form.number_of_people }}
                </div>
                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary">予約する</button>
                    <a href="{% url 'restaurant_detail' restaurant.pk %}" class="btn btn-outline-secondary">キャンセル</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
