{% extends "base.html" %}
{% load static %}

{% block title %}カード情報変更 - なごやめし{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <h2 class="mb-4 text-center">クレジットカード情報の変更</h2>
            <div class="card">
                <div class="card-body">
                    <form id="payment-form" method="post" action="{% url 'payment_update' %}">
                        {% csrf_token %}
                        <input type="hidden" id="payment-method-id" name="payment_method_id" value="">

                        <div class="mb-3">
                            <label class="form-label">新しいクレジットカード情報</label>
                            <div id="card-element" class="form-control" style="padding: 12px;"></div>
                            <div id="card-errors" class="text-danger mt-2" role="alert"></div>
                        </div>

                        <button type="submit" id="submit-btn" class="btn btn-reserve w-100">変更する</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="stripe-key" data-key="{{ stripe_publishable_key }}" style="display:none;"></div>
<script src="https://js.stripe.com/v3/"></script>
<script src="{% static 'js/stripe.js' %}"></script>
{% endblock %}
