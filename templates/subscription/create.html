{% extends "base.html" %}
{% load static %}

{% block title %}有料会員登録 - なごやめし{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <h2 class="mb-4 text-center">有料会員登録</h2>
            <div class="card">
                <div class="card-body">
                    <p class="text-center mb-4">月額 <strong>300円</strong>（税込）</p>
                    <ul class="mb-4">
                        <li>お気に入り店舗の登録</li>
                        <li>レストランの予約</li>
                        <li>レビューの投稿</li>
                    </ul>

                    <form id="payment-form" method="post" action="{% url 'subscription_create' %}">
                        {% csrf_token %}
                        <input type="hidden" id="payment-method-id" name="payment_method_id" value="">

                        <div class="mb-3">
                            <label class="form-label">クレジットカード情報</label>
                            <div id="card-element" class="form-control" style="padding: 12px;"></div>
                            <div id="card-errors" class="text-danger mt-2" role="alert"></div>
                        </div>

                        <button type="submit" id="submit-btn" class="btn btn-reserve w-100">登録する</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="stripe-key" data-key="{{ stripe_publishable_key }}" style="display:none;"></div>
<script src="https://js.stripe.com/v3/"></script>
<script src="{% static 'js/stripe.js' %}"></script>
{% endblock %}
