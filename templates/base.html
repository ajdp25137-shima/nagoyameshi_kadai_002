<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}なごやめしーNagoyameshiー{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@700&family=Sawarabi+Mincho&display=swap" rel="stylesheet">
    <style>
        :root {
            --wagashi-red: #B22D35; /* 落ち着いた朱色 */
            --katsu-iro: #002B41;  /* 勝色（濃紺） */
            --washi-white: #F9F7F2; /* 和紙のような白 */
        }
        body {
            font-family: 'Sawarabi Mincho', serif;
            background-color: var(--washi-white);
            color: #333;
        }
        .navbar {
            background-color: white;
            border-bottom: 3px solid var(--wagashi-red);
            padding: 1rem 2rem;
        }
        .navbar-brand {
            font-family: 'Noto Serif JP', serif;
            font-weight: bold;
            color: var(--katsu-iro) !important;
            font-size: 1.5rem;
        }
        .nav-link {
            color: var(--katsu-iro);
            font-weight: 600;
            margin-left: 15px;
        }
        .btn-reserve {
            background-color: var(--wagashi-red);
            color: white;
            border-radius: 0;
            padding: 0.5rem 1.5rem;
        }
        .footer {
            background-color: var(--katsu-iro);
            color: white;
            padding: 2rem 0;
            margin-top: 50px;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="{% url 'top_page' %}">
                なごやめし<span style="color: var(--wagashi-red);">ーNagoyameshiー</span>
            </a>
            
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav align-items-center">
                    <li class="nav-item">
                        <a class="nav-link" href="#">会員登録</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">ログイン</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link btn btn-reserve ms-lg-3" href="#">予約一覧</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main>
        {% block content %}
        {% endblock %}
    </main>

    <footer class="footer text-center">
        <p>&copy; 2026 なごやめしーNagoyameshiー All Rights Reserved.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
