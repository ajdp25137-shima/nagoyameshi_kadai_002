{% extends 'base.html' %}

{% block content %}
<style>
    .hero-section {
        background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('https://images.unsplash.com/photo-1590257008130-976865239e24?auto=format&fit=crop&w=1200&q=80'); /* サンプル画像：名古屋城や名古屋飯の画像に差し替え */
        background-size: cover;
        background-position: center;
        height: 500px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        text-align: center;
    }
    .hero-title {
        font-size: 3.5rem;
        text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
    }
    .search-container {
        background: white;
        padding: 30px;
        border-radius: 8px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        margin-top: -50px;
        position: relative;
        z-index: 10;
    }
    .category-card {
        border: 1px solid #ddd;
        transition: transform 0.3s;
        cursor: pointer;
        background: white;
        border-radius: 0;
    }
    .category-card:hover {
        transform: translateY(-5px);
        border-color: var(--wagashi-red);
    }
</style>

<div class="hero-section">
    <div>
        <h1 class="hero-title">Taste the Heart of Nagoya</h1>
        <p class="fs-4">本場の名古屋飯を、あなたの旅の思い出に。</p>
    </div>
</div>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-10 search-container">
            <form action="#" method="GET" class="row g-3">
                <div class="col-md-5">
                    <input type="text" class="form-control form-control-lg" placeholder="キーワード（例：ひつまぶし、味噌カツ）">
                </div>
                <div class="col-md-4">
                    <select class="form-select form-select-lg">
                        <option selected>エリアを選択</option>
                        <option value="sakae">栄・伏見</option>
                        <option value="meieki">名古屋駅周辺</option>
                        <option value="osu">大須・金山</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <button type="submit" class="btn btn-reserve w-100 btn-lg">検索する</button>
                </div>
            </form>
        </div>
    </div>

    <div class="mt-5">
        <h2 class="text-center mb-4">名古屋飯カテゴリー</h2>
        <div class="row row-cols-2 row-cols-md-4 g-4 text-center">
            <div class="col">
                <div class="card h-100 category-card p-3">
                    <div class="fs-1">鰻</div>
                    <div class="fw-bold">ひつまぶし</div>
                </div>
            </div>
            <div class="col">
                <div class="card h-100 category-card p-3">
                    <div class="fs-1">🐷</div>
                    <div class="fw-bold">味噌カツ</div>
                </div>
            </div>
            <div class="col">
                <div class="card h-100 category-card p-3">
                    <div class="fs-1">🍜</div>
                    <div class="fw-bold">きしめん</div>
                </div>
            </div>
            <div class="col">
                <div class="card h-100 category-card p-3">
                    <div class="fs-1">🐓</div>
                    <div class="fw-bold">手羽先</div>
                </div>
            </div>
        </div>
    </div>

    <div class="mt-5 mb-5">
        <h2 class="text-center mb-4">注目の名店</h2>
        <div class="row">
            <div class="col-md-4 mb-4">
                <div class="card h-100 shadow-sm border-0">
                    <img src="https://images.unsplash.com/photo-1580822184713-fc5400e7fe10?auto=format&fit=crop&w=400&q=80" class="card-img-top" alt="料理写真">
                    <div class="card-body">
                        <h5 class="card-title fw-bold">名古屋ダイニング 〇〇</h5>
                        <p class="text-muted small">栄駅から徒歩5分</p>
                        <p class="card-text">創業以来守り続ける秘伝のタレが絶品のひつまぶし専門店。</p>
                        <a href="#" class="btn btn-outline-dark w-100">詳細を見る</a>
                    </div>
                </div>
            </div>
            </div>
    </div>
</div>
{% endblock %}
